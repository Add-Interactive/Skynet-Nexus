<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Portal — Skynet Nexus News</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap"/>
  <link rel="stylesheet" href="/assets/css/style.css?v=20260705-1"/>
  <link rel="stylesheet" href="/assets/css/admin.css?v=20260705-1"/>
</head>
<body class="admin-body">

  <!-- Auth gate: shown until we confirm an admin/editor session -->
  <div id="admin-gate" class="admin-gate">
    <div class="admin-gate-card">
      <div class="admin-gate-brand">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
          <defs><linearGradient id="ag1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
          <path d="M20 3l14 8v18l-14 8L6 29V11z" fill="none" stroke="url(#ag1)" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M20 12l7 4v8l-7 4-7-4v-8z" fill="url(#ag1)" opacity=".95"/>
          <circle cx="20" cy="20" r="2.5" fill="#0a0e17"/>
        </svg>
        <div>
          <div class="admin-gate-title">Skynet Nexus</div>
          <div class="admin-gate-sub">Newsroom Admin Portal</div>
        </div>
      </div>
      <div id="admin-gate-status" class="admin-gate-status">Checking your session…</div>
      <form id="admin-login-form" class="admin-login-form" hidden>
        <label>Email<input type="email" id="admin-login-email" autocomplete="username" required/></label>
        <label>Password<input type="password" id="admin-login-password" autocomplete="current-password" required/></label>
        <button type="submit" class="admin-btn admin-btn-primary">Sign in</button>
        <p class="admin-login-error" id="admin-login-error" hidden></p>
      </form>
      <a class="admin-gate-back" href="/index.html">← Back to site</a>
    </div>
  </div>

  <!-- Portal shell (hidden until authorized) -->
  <div id="admin-app" class="admin-shell" hidden>
    <header class="admin-topbar">
      <a href="/index.html" class="admin-brand" aria-label="Skynet Nexus News">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" width="30" height="30">
          <defs><linearGradient id="ag2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
          <path d="M20 3l14 8v18l-14 8L6 29V11z" fill="none" stroke="url(#ag2)" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M20 12l7 4v8l-7 4-7-4v-8z" fill="url(#ag2)" opacity=".95"/>
        </svg>
        <span><strong>SKYNET NEXUS</strong><small>Admin Portal</small></span>
      </a>
      <button class="admin-btn admin-menu-btn" id="admin-menu-btn" aria-label="Menu">☰</button>
      <div class="admin-topbar-right">
        <span class="admin-env-pill" id="admin-role-pill">—</span>
        <a class="admin-btn" href="/index.html" target="_blank" rel="noopener">View site ↗</a>
        <span class="admin-whoami" id="admin-whoami">—</span>
        <button class="admin-btn admin-btn-ghost" id="admin-logout">Sign out</button>
      </div>
    </header>

    <div class="admin-layout">
      <nav class="admin-nav" id="admin-nav">
        <button class="admin-nav-link active" data-view="dashboard"><span>📊</span> Dashboard</button>
        <button class="admin-nav-link" data-view="agents"><span>🛰️</span> Agents &amp; Staff</button>
        <button class="admin-nav-link" data-view="submissions"><span>📥</span> Submissions <em class="admin-badge" id="nav-badge-submissions" hidden>0</em></button>
        <button class="admin-nav-link" data-view="queue"><span>📝</span> Story Queue <em class="admin-badge" id="nav-badge-queue" hidden>0</em></button>
        <button class="admin-nav-link" data-view="compose"><span>✍️</span> Write / Publish</button>
        <button class="admin-nav-link" data-view="published"><span>📰</span> Published Articles</button>
        <button class="admin-nav-link" data-view="images"><span>🖼️</span> Image Pools</button>
        <button class="admin-nav-link admin-only" data-view="users"><span>👥</span> Users &amp; Roles</button>
        <button class="admin-nav-link" data-view="audit"><span>🧾</span> Audit Log</button>
        <button class="admin-nav-link" data-view="antigravity"><span>👾</span> Antigravity Desk</button>
      </nav>

      <main class="admin-main" id="admin-main">
        <div class="admin-loading">Loading…</div>
      </main>
    </div>
  </div>

  <div id="admin-toast" class="admin-toast"></div>

  <script src="/assets/js/admin.js?v=20260705-8"></script>
</body>
</html>
