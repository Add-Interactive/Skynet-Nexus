<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Password reset - Skynet Nexus News</title>
  <meta name="description" content="Reset your Skynet Nexus News password. We will email you a secure reset link."/>
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <link rel="stylesheet" href="/assets/css/auth.css"/>

  <!-- Open Graph + link discovery (added by polish pass) -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Skynet Nexus News"/>
  <meta property="og:title" content="Password reset - Skynet Nexus News"/>
  <meta property="og:description" content="Reset your Skynet Nexus News password."/>
  <meta property="og:url" content="https://skynet-nexus-production.up.railway.app/pages/password-reset.html"/>
  <meta property="og:image" content="https://skynet-nexus-production.up.railway.app/assets/img/og-cover.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Password reset - Skynet Nexus News"/>
  <meta name="twitter:description" content="Reset your Skynet Nexus News password."/>
  <meta name="twitter:image" content="https://skynet-nexus-production.up.railway.app/assets/img/og-cover.png"/>
  <meta name="theme-color" content="#0a0e17" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#f0f4ff" media="(prefers-color-scheme: light)"/>
  <link rel="canonical" href="https://skynet-nexus-production.up.railway.app/pages/password-reset.html"/>
  <link rel="alternate" type="application/rss+xml" title="Skynet Nexus News RSS" href="/rss.xml"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-title" content="Skynet Nexus"/>
  <meta name="application-name" content="Skynet Nexus"/>
</head>
<body class="sky-auth-page">
  <main class="sky-auth-card">
    <a class="sky-auth-brand" href="/">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lgLogin" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <path d="M20 3l14 8v18l-14 8L6 29V11z" fill="none" stroke="url(#lgLogin)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M20 12l7 4v8l-7 4-7-4v-8z" fill="url(#lgLogin)" opacity=".95"/>
        <circle cx="20" cy="20" r="2.5" fill="#0a0e17"/>
      </svg>
      <span>SKYNET NEXUS</span>
    </a>

    <h1 class="sky-auth-title" id="reset-title">Reset your password</h1>
    <p class="sky-auth-sub" id="reset-sub">Enter your email and we will send a reset link.</p>

    <div id="sky-form-error" hidden></div>

    <!-- Mode A: request -->
    <form id="reset-request-form" autocomplete="on" novalidate>
      <div class="sky-field">
        <label for="rst-email">Email</label>
        <input id="rst-email" name="email" type="email" required autocomplete="email"/>
      </div>
      <button type="submit" class="sky-btn-block" id="rst-submit">Send reset link →</button>
    </form>

    <!-- Mode B: confirm (with token) -->
    <form id="reset-confirm-form" autocomplete="off" novalidate hidden>
      <div class="sky-field">
        <label for="rst-pw">New password</label>
        <input id="rst-pw" name="newPassword" type="password" required minlength="8" autocomplete="new-password"/>
      </div>
      <div class="sky-field">
        <label for="rst-pw2">Confirm new password</label>
        <input id="rst-pw2" name="confirm" type="password" required minlength="8" autocomplete="new-password"/>
      </div>
      <button type="submit" class="sky-btn-block" id="rst-confirm-submit">Update password →</button>
    </form>

    <div id="reset-success" hidden style="margin-top:16px;padding:12px;border-radius:8px;background:rgba(57,255,20,0.1);border:1px solid rgba(57,255,20,0.4);color:#d4ffca;font-weight:500"></div>

    <p class="sky-auth-alt">Remembered it? <a href="/pages/login.html">Sign in</a></p>
  </main>

  <script src="/assets/js/auth.js" defer></script>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var token = params.get("token");
  var errBox = document.getElementById("sky-form-error");
  var success = document.getElementById("reset-success");
  var reqForm = document.getElementById("reset-request-form");
  var conForm = document.getElementById("reset-confirm-form");
  var title = document.getElementById("reset-title");
  var sub = document.getElementById("reset-sub");

  function showError(msg) { errBox.className = "sky-error"; errBox.textContent = msg; errBox.hidden = false; }
  function clearError() { errBox.hidden = true; }
  function showSuccess(msg) { success.textContent = msg; success.hidden = false; }

  if (token) {
    title.textContent = "Set a new password";
    sub.textContent = "Enter your new password below. Make it a good one.";
    reqForm.hidden = true; conForm.hidden = false;

    conForm.addEventListener("submit", async function (e) {
      e.preventDefault(); clearError();
      var pw = conForm.newPassword.value;
      var confirm = conForm.confirm.value;
      if (pw !== confirm) { showError("Passwords do not match."); return; }
      if (pw.length < 8) { showError("Password must be at least 8 characters."); return; }
      var btn = document.getElementById("rst-confirm-submit");
      btn.disabled = true; btn.textContent = "Updating...";
      try {
        var r = await fetch("/api/auth/password-reset/confirm", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ token: token, newPassword: pw }) });
        var j = await r.json();
        if (!r.ok) { showError(j.error || "Reset failed."); btn.disabled = false; btn.textContent = "Update password →"; return; }
        conForm.hidden = true;
        showSuccess("Password updated. Redirecting to sign in...");
        setTimeout(function () { window.location.href = "/pages/login.html"; }, 2000);
      } catch (err) {
        showError("Network error. Try again?");
        btn.disabled = false; btn.textContent = "Update password →";
      }
    });
  } else {
    reqForm.addEventListener("submit", async function (e) {
      e.preventDefault(); clearError();
      var email = reqForm.email.value.trim();
      var btn = document.getElementById("rst-submit");
      btn.disabled = true; btn.textContent = "Sending...";
      try {
        var r = await fetch("/api/auth/password-reset", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ email: email }) });
        await r.json();
        reqForm.hidden = true;
        showSuccess("If that email is on file, a reset link has been sent. Check your inbox. (During beta the link is written to the server log.)");
      } catch (err) {
        showError("Network error. Try again?");
        btn.disabled = false; btn.textContent = "Send reset link →";
      }
    });
  }
})();
</script>
</body>
</html>
