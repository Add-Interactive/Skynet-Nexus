<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🛰️ SKYNET NEXUS — Newsroom Command Center v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      color: #00ff41;
      font-family: 'Orbitron', monospace;
      line-height: 1.5;
      letter-spacing: 0.05em;
      overflow: hidden;
      min-height: 100vh;
    }
    
    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 999;
    }
    
    .app-container {
      display: grid;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      gap: 8px;
      padding: 8px;
      background: #000;
    }
    
    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 20px;
      background: linear-gradient(90deg, #001a4d 0%, #0d0d26 100%);
      border: 2px solid #00ff41;
      border-radius: 0 12px 0 0;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
    }
    
    .topbar-title {
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }
    
    .topbar-status {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      font-size: 12px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff00;
      box-shadow: 0 0 10px #00ff00;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .topbar-buttons {
      display: flex;
      gap: 8px;
    }
    
    .btn-nav {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-nav:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 10px #00ff41;
    }
    
    .btn-nav.active {
      background: #00ff41;
      color: #000;
    }
    
    /* MAIN CONTENT */
    .content {
      display: grid;
      grid-template-columns: 320px 1fr 360px;
      gap: 8px;
      height: 100%;
      overflow: hidden;
    }
    
    .panel {
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #001a4d 0%, #000d26 100%);
      border: 2px solid #00ff41;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 10px rgba(0, 255, 65, 0.1);
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .panel-header {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      border-bottom: 1px dashed #00ff41;
      padding-bottom: 12px;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }
    
    /* LEFT PANEL: CREW */
    #crew-panel {
      gap: 8px;
    }
    
    .crew-member {
      padding: 12px;
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid #00ccff;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }
    
    .crew-member:hover {
      background: rgba(0, 255, 65, 0.15);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
      border-color: #00ff41;
    }
    
    .crew-member.active {
      background: rgba(0, 255, 65, 0.2);
      border-color: #00ff41;
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
    }
    
    .crew-name {
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .crew-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.8;
    }
    
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid #00ccff;
      border-radius: 2px;
      font-size: 10px;
      text-transform: uppercase;
    }
    
    .status-badge.idle { border-color: #00ff41; }
    .status-badge.writing { border-color: #ffff00; background: rgba(255, 255, 0, 0.1); }
    .status-badge.filing { border-color: #ff6600; background: rgba(255, 102, 0, 0.1); }
    .status-badge.approved { border-color: #00ff00; background: rgba(0, 255, 0, 0.1); }
    
    /* CENTER: CANVAS + QUEUE */
    .center-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }
    
    #bridge-canvas {
      flex: 1;
      background: #000;
      border: 2px solid #00ccff;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 204, 255, 0.3);
      cursor: crosshair;
    }
    
    .queue-panel {
      height: 180px;
      padding: 12px;
      background: linear-gradient(135deg, #001a4d 0%, #000d26 100%);
      border: 2px solid #00ff41;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
      overflow-y: auto;
    }
    
    .queue-item {
      padding: 8px;
      background: rgba(0, 255, 65, 0.05);
      border-left: 3px solid #00ccff;
      margin-bottom: 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 2px;
    }
    
    .queue-item:hover {
      background: rgba(0, 255, 65, 0.15);
      border-left-color: #00ff41;
    }
    
    .queue-item.selected {
      background: rgba(0, 255, 65, 0.2);
      border-left-color: #00ff41;
      box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
    }
    
    .queue-title {
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .queue-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      opacity: 0.7;
    }
    
    /* RIGHT PANEL: EDITOR */
    #editor-panel {
      max-height: 100%;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    
    .editor-header {
      padding: 16px;
      border-bottom: 2px solid #00ff41;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }
    
    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .editor-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .editor-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00ccff;
    }
    
    .editor-input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff41;
      color: #00ff41;
      padding: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      border-radius: 2px;
    }
    
    .editor-input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
    }
    
    .editor-textarea {
      resize: vertical;
      min-height: 80px;
      max-height: 150px;
    }
    
    .editor-actions {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 2px solid #00ff41;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .btn-action {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 2px;
    }
    
    .btn-action:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 10px #00ff41;
    }
    
    .btn-action.danger {
      border-color: #ff0066;
      color: #ff0066;
    }
    
    .btn-action.danger:hover {
      background: #ff0066;
      color: #fff;
      box-shadow: 0 0 10px #ff0066;
    }
    
    .btn-action:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      background: linear-gradient(135deg, #001a4d 0%, #000d26 100%);
      border: 2px solid #00ff41;
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
    }
    
    .modal-close {
      float: right;
      cursor: pointer;
      font-size: 20px;
      color: #00ff41;
    }
    
    .modal-close:hover {
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }
    
    ::-webkit-scrollbar-thumb {
      background: #00ff41;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #00ccff;
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
    }
  </style>
</head>
<body>

<div class="app-container">
  
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title">🛰️ SKYNET NEXUS NEWSROOM v2.0</div>
    <div style="flex: 1;"></div>
    <div class="topbar-status">
      <span>SYSTEM STATUS:</span>
      <div class="status-dot"></div>
      <span>NOMINAL</span>
    </div>
    <div class="topbar-status">
      <span id="time-display">00:00 ET</span>
    </div>
  </div>
  
  <!-- MAIN CONTENT -->
  <div class="content">
    
    <!-- LEFT: CREW MANIFEST -->
    <div id="crew-panel" class="panel">
      <div class="panel-header">🎭 Bridge Crew</div>
      <!-- Crew members will be populated here -->
    </div>
    
    <!-- CENTER: BRIDGE CANVAS + QUEUE -->
    <div class="center-content">
      <canvas id="bridge-canvas"></canvas>
      <div class="queue-panel">
        <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px dashed #00ff41; padding-bottom: 8px; text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);">📋 Queue Monitor</div>
        <div id="queue-list">
          <!-- Queue items populated here -->
        </div>
      </div>
    </div>
    
    <!-- RIGHT: STORY EDITOR -->
    <div id="editor-panel" class="panel">
      <div class="editor-header">📝 Story Editor</div>
      <div class="editor-content">
        <div class="editor-section">
          <label class="editor-label">Agent</label>
          <div id="editor-agent" class="editor-input">Select a story</div>
        </div>
        <div class="editor-section">
          <label class="editor-label">Channel</label>
          <input id="editor-channel" class="editor-input" readonly>
        </div>
        <div class="editor-section">
          <label class="editor-label">Headline</label>
          <input id="editor-title" class="editor-input" placeholder="Story headline">
        </div>
        <div class="editor-section">
          <label class="editor-label">Status</label>
          <div id="editor-status" class="editor-input">—</div>
        </div>
      </div>
      <div class="editor-actions">
        <button class="btn-action" id="btn-edit">✏️ Edit</button>
        <button class="btn-action" id="btn-approve">✅ Approve</button>
        <button class="btn-action danger" id="btn-reject">❌ Reject</button>
      </div>
    </div>
    
  </div>
  
</div>

<!-- MODALS -->
<div id="modal-edit" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="document.getElementById('modal-edit').classList.remove('open');">&times;</span>
    <h2 style="margin-bottom: 20px;">Full Story Editor</h2>
    <!-- Full editor will go here -->
  </div>
</div>

<div id="modal-revision" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="document.getElementById('modal-revision').classList.remove('open');">&times;</span>
    <h2 style="margin-bottom: 20px;">Request Revision</h2>
    <!-- Revision request form will go here -->
  </div>
</div>

<!-- SCRIPTS -->
<script src="assets/js/iso-renderer.js"></script>
<script src="assets/js/sprite-animator.js"></script>
<script src="assets/js/newsroom-state.js"></script>

<script>
  // Initialize
  let state = new NewsroomState();
  let renderer = new IsoRenderer('bridge-canvas', 900, 500);
  let animator = new SpriteAnimator();
  
  // Generate placeholder sprites
  const spriteFrames = PlaceholderSpriteGenerator.generateAllAgents();
  for (const agentId in spriteFrames) {
    animator.registerSprite(agentId, spriteFrames[agentId]);
  }
  
  // Add agents to canvas
  for (const agent of state.agents) {
    renderer.addSprite(agent.id, agent.gridX, agent.gridY, 0, null, 32, 32);
  }
  
  // Populate crew panel
  function renderCrewPanel() {
    const panel = document.getElementById('crew-panel');
    const header = panel.querySelector('.panel-header');
    
    for (const agent of state.agents) {
      let elem = document.getElementById(`crew-${agent.id}`);
      if (!elem) {
        elem = document.createElement('div');
        elem.id = `crew-${agent.id}`;
        elem.className = 'crew-member';
        panel.appendChild(elem);
      }
      
      elem.innerHTML = `
        <div class="crew-name">${agent.emoji} ${agent.name}</div>
        <div class="crew-stats">
          <span>${agent.channel}</span>
          <span class="status-badge ${agent.status}">${agent.status}</span>
        </div>
        <div style="font-size: 10px; margin-top: 6px; opacity: 0.7;">Stories: ${agent.storiesCount}</div>
      `;
      
      elem.onclick = () => selectAgent(agent.id);
    }
  }
  
  // Populate queue panel
  function renderQueuePanel() {
    const list = document.getElementById('queue-list');
    list.innerHTML = '';
    
    for (const story of state.queue.slice(0, 15)) {
      const item = document.createElement('div');
      item.className = 'queue-item';
      if (state.selectedStory && state.selectedStory.id === story.id) {
        item.classList.add('selected');
      }
      
      item.innerHTML = `
        <div class="queue-title">${story.payload?.title || 'Untitled'}</div>
        <div class="queue-meta">
          <span>${story.channel}</span>
          <span class="status-badge ${story.status}">${story.status}</span>
        </div>
      `;
      
      item.onclick = () => selectStory(story.id);
      list.appendChild(item);
    }
  }
  
  // Select story
  function selectStory(storyId) {
    const story = state.selectStory(storyId);
    if (story) {
      document.getElementById('editor-agent').textContent = state.selectedAgent?.name || '—';
      document.getElementById('editor-channel').value = story.channel;
      document.getElementById('editor-title').value = story.payload?.title || '';
      document.getElementById('editor-status').textContent = story.status.toUpperCase();
      
      renderQueuePanel();
    }
  }
  
  // Select agent
  function selectAgent(agentId) {
    state.selectAgent(agentId);
    document.querySelectorAll('.crew-member').forEach(el => el.classList.remove('active'));
    document.getElementById(`crew-${agentId}`).classList.add('active');
    
    // Show agent's stories in queue
    // (Could highlight them or filter the queue)
  }
  
  // Button handlers
  document.getElementById('btn-approve').onclick = async () => {
    if (state.selectedStory) {
      await state.approveStory(state.selectedStory.id);
      await state.fetchQueue();
      selectStory(state.selectedStory.id);
    }
  };
  
  document.getElementById('btn-reject').onclick = async () => {
    if (state.selectedStory) {
      await state.rejectStory(state.selectedStory.id);
      await state.fetchQueue();
      selectStory(null);
    }
  };
  
  document.getElementById('btn-edit').onclick = () => {
    document.getElementById('modal-edit').classList.add('open');
  };
  
  // Time display
  function updateTime() {
    const now = new Date();
    const et = new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    }).format(now);
    document.getElementById('time-display').textContent = et + ' ET';
  }
  
  // Animation loop
  function animate() {
    animator.update(16);
    
    for (const agent of state.agents) {
      renderer.updateSprite(agent.id, agent.status);
    }
    
    renderer.tick();
    requestAnimationFrame(animate);
  }
  
  // Initialize
  async function init() {
    renderCrewPanel();
    
    await state.fetchQueue();
    renderQueuePanel();
    
    await state.fetchMetrics();
    
    state.poll(5000); // Poll every 5 seconds
    
    updateTime();
    setInterval(updateTime, 1000);
    
    animate();
  }
  
  init();
</script>

</body>
</html>
